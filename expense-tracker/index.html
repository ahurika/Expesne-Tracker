<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1>💰 Expense Tracker</h1>
      <p class="current-date" id="currentDate"></p>
    </header>

    <div class="dashboard">
      <section class="card form-card">
        <h2>Add New Expense</h2>
        <form id="expenseForm">
          <div class="form-group">
            <label for="expenseName">Expense Name</label>
            <input
              type="text"
              id="expenseName"
              placeholder="Enter expense name"
              autocomplete="off"
            />
            <span class="error-message" id="nameError"></span>
          </div>
          <div class="form-group">
            <label for="expenseAmount">Amount</label>
            <input
              type="number"
              id="expenseAmount"
              placeholder="₦0.00"
              step="0.01"
              min="0"
            />
            <span class="error-message" id="amountError"></span>
          </div>
          <button type="submit" class="btn btn-primary" id="addBtn">
            Add Expense
          </button>
        </form>
      </section>

      <section class="card summary-card">
        <h2>Summary</h2>
        <p class="summary-label">Total Spending</p>
        <p class="summary-amount" id="totalAmount">₦0.00</p>
        <p class="expense-count" id="expenseCount">0 expenses</p>
      </section>
    </div>

    <section class="card list-card" id="listCard">
      <h2>Expense History</h2>
      <div id="expenseList">
        <div class="empty-state" id="emptyState">
          <span class="empty-icon">📋</span>
          <p>No expenses added yet.</p>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
