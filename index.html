<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Money — Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="header-content">
        <div class="header-brand">
          <span class="header-logo">₦</span>
          <div>
            <h1>Smart Money</h1>
            <p class="current-date" id="currentDate"></p>
          </div>
        </div>
        <div class="header-stat">
          <span class="header-stat-label">Total Balance</span>
          <strong class="header-stat-value" id="headerTotal">₦0.00</strong>
        </div>
      </div>
    </header>

    <div class="dashboard">
      <section class="card form-card">
        <h2>Add New Expense</h2>
        <form id="expenseForm">
          <div class="form-group">
            <label for="expenseName">Expense Name</label>
            <input
              type="text"
              id="expenseName"
              placeholder="Enter expense name"
              autocomplete="off"
            />
            <span class="error-message" id="nameError"></span>
          </div>
          <div class="form-group">
            <label for="expenseAmount">Amount (₦)</label>
            <input
              type="number"
              id="expenseAmount"
              placeholder="0.00"
              step="0.01"
              min="0"
            />
            <span class="error-message" id="amountError"></span>
          </div>
          <div class="form-group">
            <label for="expenseCategory">Category</label>
            <select id="expenseCategory">
              <option value="">Select category</option>
            </select>
            <span class="error-message" id="categoryError"></span>
          </div>
          <button type="submit" class="btn btn-primary" id="addBtn">
            Add Expense
          </button>
        </form>
      </section>

      <section class="card summary-card">
        <h2>Summary</h2>
        <p class="summary-label">Total Spending</p>
        <p class="summary-amount" id="totalAmount">₦0.00</p>
        <p class="expense-count" id="expenseCount">0 expenses</p>
      </section>
    </div>

    <section class="card list-card" id="listCard">
      <div class="list-header">
        <h2>Expense History</h2>
      </div>
      <div id="expenseList"></div>
    </section>

    <section class="card chart-card">
      <div class="chart-header">
        <h2>Spending Overview</h2>
        <div class="chart-filters" id="chartFilters">
          <button class="filter-btn" data-filter="daily">Daily</button>
          <button class="filter-btn" data-filter="weekly">Weekly</button>
          <button class="filter-btn active" data-filter="monthly">Monthly</button>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas id="expenseChart"></canvas>
        <div class="chart-empty" id="chartEmpty">
          <p>No expenses for this period.</p>
        </div>
      </div>
    </section>
  </div>

  <div class="modal-overlay" id="deleteModalOverlay">
    <div class="modal" id="deleteModal">
      <h3>Delete Expense?</h3>
      <p id="deleteModalBody">This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="deleteCancel">Cancel</button>
        <button class="btn btn-danger modal-delete-btn" id="deleteConfirm">Delete</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="editModalOverlay">
    <div class="modal" id="editModal">
      <h3>Edit Expense</h3>
      <form id="editForm">
        <div class="form-group">
          <label for="editName">Expense Name</label>
          <input type="text" id="editName" autocomplete="off" />
          <span class="error-message" id="editNameError"></span>
        </div>
        <div class="form-group">
          <label for="editAmount">Amount (₦)</label>
          <input type="number" id="editAmount" step="0.01" min="0" />
          <span class="error-message" id="editAmountError"></span>
        </div>
        <div class="form-group">
          <label for="editCategory">Category</label>
          <select id="editCategory"></select>
          <span class="error-message" id="editCategoryError"></span>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="editCancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="successOverlay">
    <div class="modal success-modal">
      <div class="success-icon">&#10003;</div>
      <p id="successMessage"></p>
      <button class="btn btn-primary" id="successOk">OK</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
